name: flight-mapper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: flight-mapper
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          KIWI_API_KEY: ${{ secrets.KIWI_API_KEY }}
        run: python -m flight_mapper cycle

      - name: Commit state
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "radar-voos-olivia[bot]"
            git config user.email "radar-voos-olivia@users.noreply.github.com"
            git add data/
            git commit -m "chore: update price history [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
