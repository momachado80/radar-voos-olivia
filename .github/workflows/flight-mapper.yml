name: flight-mapper

on:
  schedule:
    # 96 ciclos/dia (PR #54). Validação SerpApi protegida por
    # SERPAPI_VALIDATION_DAILY_BUDGET no env do step Run cycle.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: flight-mapper
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          KIWI_API_KEY: ${{ secrets.KIWI_API_KEY }}
          USD_BRL_RATE: ${{ vars.USD_BRL_RATE }}
          # Validação SerpApi opt-in (PR #52, ativada em PR #53,
          # protegida com orçamento MENSAL em PR #55):
          # • cap intra-ciclo: 1 candidato;
          # • cap mensal UTC: 90 queries (= ~30 validações × 3 queries),
          #   persistido em data/serpapi_validation_budget.json
          #   (apenas {month_utc, count}, nunca payload/token);
          # • free-tier SerpApi típico: 100 queries/mês → 90 deixa
          #   margem de segurança;
          # • falha silenciosa se key ausente ou budget esgotado.
          SERPAPI_VALIDATION_ENABLED: "true"
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPAPI_VALIDATION_MAX_PER_CYCLE: "1"
          SERPAPI_VALIDATION_MONTHLY_BUDGET: "90"
          # Duffel read-only confirmed business offers (PR #64). Pass
          # ADITIVO: gera alerta 🟢 "oferta confirmada" via order_flow,
          # NUNCA cria order/payment, NUNCA expõe offer_id/token/payload.
          # Cap MUITO conservador: 1 Offer Request por ciclo. Falha
          # silenciosa se token ausente. Histórico isolado em
          # data/duffel_history.json (só preço BRL + timestamp).
          # EUR_BRL_RATE: offers Duffel costumam vir em EUR; sem a taxa o
          # alerta é bloqueado com segurança (não inventamos câmbio).
          DUFFEL_PROVIDER_ENABLED: "true"
          DUFFEL_ACCESS_TOKEN: ${{ secrets.DUFFEL_ACCESS_TOKEN }}
          DUFFEL_MAX_REQUESTS_PER_CYCLE: "1"
          EUR_BRL_RATE: ${{ vars.EUR_BRL_RATE }}
          # PR #77: pool de rotas Duffel.
          # - `broad` (default): 8 rotas (MIA/LHR/CDG/JFK/MAD/LIS/FCO/AMS) ×
          #   business+economy × one_way+round_trip = 32 entradas, com
          #   rotação pelo offset em data/duffel_watchlist_state.json.
          # - `watchlist` (opt-in): Londres/Paris setembro/2026 (PR #67/#68).
          # - `disabled`: pool vazio.
          # PR #80: cap de 8 consultas/ciclo. Com 32 entradas no pool broad
          # e rotação, cobre o pool inteiro em ~4 ciclos (≈1h) — alinhado ao
          # objetivo de ofertas em TEMPO REAL, sem represar. Ainda read-only
          # (só Offer Requests, nunca order/payment) e conservador p/ quota.
          DUFFEL_ROUTE_MODE: "broad"
          DUFFEL_WATCHLIST_MAX_REQUESTS_PER_CYCLE: "8"
          # PR #80: a Olivia quer as ofertas EM TEMPO REAL (não resumo
          # diário). `grouped_push`: quando o ciclo (a cada 15 min) acha
          # ofertas Duffel confirmadas que batem o alvo, manda UMA mensagem
          # agrupada na hora, com o link Google Flights pré-preenchido por
          # oferta. Cooldown de 6h por combo (rota/cabine/datas) evita
          # repetir a mesma oferta; queda de preço ≥5% fura o cooldown.
          # `daily_only` (resumo 1x/dia) e `disabled` continuam disponíveis.
          # Só `direct_link` (ex.: Kiwi, se houver chave) dispara push de
          # COMPRA imediato; Duffel segue order_flow (busca, não checkout).
          DUFFEL_ORDER_FLOW_ALERT_MODE: "grouped_push"
        run: python -m flight_mapper cycle

      - name: Commit state
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "radar-voos-olivia[bot]"
            git config user.email "radar-voos-olivia@users.noreply.github.com"
            git add data/
            git commit -m "chore: update price history [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
