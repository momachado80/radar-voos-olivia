name: flight-hot-scan

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: flight-hot-scan
  cancel-in-progress: false

jobs:
  hot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -r requirements.txt

      - name: Hot scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          KIWI_API_KEY: ${{ secrets.KIWI_API_KEY }}
          USD_BRL_RATE: ${{ vars.USD_BRL_RATE }}
        run: python -m flight_mapper hot-scan

      - name: Commit state
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "radar-voos-olivia[bot]"
          git config user.email "radar-voos-olivia@users.noreply.github.com"
          git add data/
          git commit -m "chore: update hot-scan state [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; sleeping $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "Push failed after 3 attempts; abandoning this cycle's state push."
          echo "Alertas Telegram já podem ter sido enviados; dedupe depende do próximo commit bem-sucedido."
          exit 0
